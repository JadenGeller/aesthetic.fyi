slug: minimalism
name: Minimalism
coined: false

tagline: "Less, but better."

prompt: |
  Pure white background (#ffffff) with near-black text (#222222).
  Maximum whitespace — padding and margins measured in 60-120px.
  Typography is Inter at weight 300-400 only, with generous
  letter-spacing (0.2-0.5em) on uppercase headings. No shadows,
  no gradients, no border-radius. Borders limited to 1px solid
  #eee or none. Two colors maximum. Elements float in space.
  The page should feel 80% empty. Content-first, design-invisible.

about: |
  Minimalism is the discipline of removal. It asks what can be taken
  away before the design breaks — and then takes away one more thing.
  What remains is only what earns its place: the content, the
  whitespace that frames it, and the typography that delivers it.

  It is not a lack of effort. It is an enormous amount of effort
  directed at appearing effortless. Every pixel of margin, every gram
  of font weight, every shade of gray is a deliberate choice. The
  goal is a page that feels inevitable — as though it could not have
  been designed any other way.

characteristics:
  - title: Maximum Whitespace
    description: >
      Padding and margin values of 60-120px between sections. The
      empty space is not wasted — it is the primary design element.
  - title: Restrained Palette
    description: >
      Two colors at most. Typically #ffffff and #222222. Any accent
      is muted — #999999 or lighter. Color is information, not
      decoration.
  - title: Thin Typography
    description: >
      Font-weight 300-400 only. No bold headings. Hierarchy is
      established through size, spacing, and case — never through
      weight.
  - title: Uppercase Labels
    description: >
      Section labels and navigation set in uppercase with
      letter-spacing of 0.2-0.5em. Small font size, 11-12px.
      Quiet authority.
  - title: Invisible Borders
    description: >
      Borders are 1px solid #eeeeee or absent entirely. No box
      shadows. No outlines on hover. Separation comes from space,
      not from lines.
  - title: Content First
    description: >
      No decorative elements. No icons unless functional. No
      background patterns. The content is the interface, and the
      interface disappears.

good_for:
  - Portfolio sites for photographers and architects
  - Brand sites for luxury and high-end products
  - Personal blogs and essays
  - Art galleries and exhibition sites
  - Documentation that values clarity above all

not_for:
  - E-commerce with dense product grids
  - Dashboards and data-heavy applications
  - Marketing pages that need to convert aggressively
  - Entertainment and media sites

history: |
  Minimalism in design descends from the Bauhaus principle that
  form follows function and the Swiss / International Typographic
  Style of the 1950s, which reduced graphic design to grids,
  sans-serifs, and asymmetric layouts. In architecture, Mies van
  der Rohe's "less is more" became a dogma. In product design,
  Dieter Rams codified it into ten principles, the first of which
  is "good design is as little design as possible."

  On the web, minimalism emerged as a reaction to the cluttered,
  ornamental interfaces of the early 2000s. Apple's website became
  the canonical reference — white backgrounds, thin Helvetica,
  enormous product photography floating in space. By the early
  2010s, minimalism was the dominant aesthetic for anyone wanting
  to signal taste, quality, or sophistication.

  It remains the baseline from which most other web aesthetics
  define themselves. Maximalism is its negation. Neubrutalism is
  its structural opposite. Glassmorphism borrows its spaciousness
  but adds the decoration minimalism forbids. Every style on the
  web exists in relationship to minimalism — either extending it
  or rebelling against it.

