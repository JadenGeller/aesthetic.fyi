  - Children's educational content
  - Corporate enterprise software

history: |
  Glitch art traces its roots to the mid-20th century when artists like
  Nam June Paik began manipulating television signals to create visual
  distortions. By the 1990s, digital artists were intentionally corrupting
  file headers, bending data, and exploiting software errors to produce
  images that existed in the space between intention and accident.

  The aesthetic gained mainstream visibility in the 2010s through music
  culture — Kanye West's Yeezus artwork, electronic music visualizers,
  and the widespread adoption of glitch effects in video production. Tools
  like datamoshing and hex editing became creative instruments rather than
  debugging techniques.

  On the web, glitch art translates into CSS animations that simulate
  signal corruption, chromatic aberration through layered text-shadows,
  and interfaces that appear to be actively breaking down. It rejects the
  web's obsession with pixel-perfect polish and asks: what if the error
  is the message? In a world of sanitized design systems, glitch art is
  a reminder that digital systems are fragile — and that fragility can
  be beautiful.

