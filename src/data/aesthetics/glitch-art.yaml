slug: glitch-art
name: Glitch Art
coined: false

tagline: "The signal broke. The error stayed. Now it's the whole point."

prompt: |
  Dark background (#0a0a0a) with light text (#e0e0e0). RGB chromatic
  aberration via text-shadow — red (#ff0040) offset left, cyan (#00ffff)
  offset right, green (#00ff41) subtle offset. Monospace font (Space Mono)
  for all text. Broken/corrupted visual artifacts via clip-path animations
  and horizontal displacement glitch effects. Scanline overlays using
  repeating-linear-gradient. Sharp CSS glitch animations with transform
  skew and translate. Accent colors: #ff0040 (red), #00ffff (cyan),
  #00ff41 (green/matrix). Borders are 1px solid #222 or #333, sometimes
  with intermittent colored flickers. The mood is digital corruption —
  broken pixels, data decay, signal interference. Nothing is polished.
  Everything looks like it barely survived transmission.

about: |
  Glitch art on the web is the celebration of failure. Where every other
  aesthetic tries to hide the seams, glitch art rips them open and frames
  the wreckage. The broken pixels are not bugs — they are the entire
  visual language. The chromatic aberration is not an accident — it is the
  aesthetic signature.

  This is design that treats digital corruption as beauty. The RGB offsets
  recall cathode ray tubes losing sync. The scanlines reference analog
  television decay. The horizontal displacement mimics data transmission
  errors. Every visual artifact tells a story about the fragility of
  digital systems — and finds something compelling in their breakdown.

characteristics:
  - title: Chromatic Aberration
    description: >
      RGB text-shadow offsets split text into red, cyan, and green
      channels — like a display losing color alignment. The effect is
      most pronounced on headings and creates the signature visual
      identity of the aesthetic.
  - title: Horizontal Displacement
    description: >
      Elements shift horizontally via transform translateX and skew,
      creating the appearance of data corruption during transmission.
      These micro-movements happen unpredictably, mimicking real
      glitch behavior.
  - title: Scanline Overlay
    description: >
      Thin repeating horizontal lines via repeating-linear-gradient
      cover surfaces like a CRT monitor. They add texture and age,
      connecting the digital present to analog broadcast history.
  - title: Dark Void Background
    description: >
      Near-black (#0a0a0a) backgrounds create a void from which
      glitched elements emerge. The darkness amplifies the intensity
      of RGB accent colors and makes every artifact feel like a
      signal breaking through noise.
  - title: Monospace Typography
    description: >
      Space Mono — a fixed-width typeface that references terminal
      output, raw data streams, and machine-readable text. Nothing
      about it is decorative. It is functional, cold, and precise
      even as everything around it corrupts.
  - title: Data Decay Animations
    description: >
      CSS keyframe animations create sharp, sudden visual breaks —
      skewing, clipping, and displacing content in unpredictable
      bursts. These are not smooth transitions. They are violent
      interruptions, like a signal being jammed.

good_for:
