  - Event posters and festival promotions

not_for:
  - Corporate enterprise platforms
  - Medical or healthcare portals
  - Financial services and banking
  - Government and institutional sites
  - E-commerce with heavy product photography

history: |
  The Risograph duplicator was created by the Riso Kagaku Corporation
  in Tokyo in 1986. Designed as a fast, affordable alternative to
  offset printing for schools and offices, it works by burning a
  stencil master onto a thermal plate and pushing ink through it via
  a rotating drum — one color per pass.

  By the 2010s, artists and independent publishers had rediscovered
  the machine. Its limitations — spot colors only, slight
  misregistration, halftone grain on uncoated paper — became its
  appeal. Riso printing became the medium of choice for zines, art
  prints, and small-run publications. Studios like Risotto in Glasgow,
  Perfectly Acceptable in Philadelphia, and Knust in Nijmegen built
  entire communities around the process.

  On the web, the risograph aesthetic translates mechanical
  imperfection into CSS: offset layers via pseudo-elements, multiply
  blend modes for ink overlap, halftone dot patterns via radial
  gradients, and limited palettes that honor the constraint of
  spot-color printing. It is design that looks printed, not rendered.

