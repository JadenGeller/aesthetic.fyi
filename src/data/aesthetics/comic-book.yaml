history: |
  The comic book visual language was codified in the 1930s and 1940s as
  superhero comics established conventions that would persist for
  decades: panel grids, speech bubbles, motion lines, bold primaries,
  and Ben-Day halftone dots for color printing on cheap newsprint. These
  weren't aesthetic choices — they were technical constraints that
  became a visual vocabulary.

  Roy Lichtenstein brought comic art into fine art galleries in the 1960s,
  enlarging individual panels and their halftone dots to monumental scale.
  Pop Art made the comic aesthetic self-aware — these weren't just
  illustrations anymore, they were a style with cultural weight.

  On the web, comic book aesthetics translate into bold borders, primary
  color palettes, and CSS-generated halftone patterns. The style found
  new life in web comics, fan sites, and superhero franchise marketing.
  It is design that celebrates the loud, the kinetic, and the
  unapologetically visual — every page a splash panel, every click a
  new issue.

