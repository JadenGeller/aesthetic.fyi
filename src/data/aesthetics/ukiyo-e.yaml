history: |
  Ukiyo-e — "pictures of the floating world" — emerged in 17th-century
  Japan as a popular art form depicting kabuki actors, beautiful women,
  landscapes, and scenes of urban pleasure. Artists like Hokusai and
  Hiroshige elevated the woodblock print into high art, creating images
  of such graphic power that they would reshape Western art when they
  reached Europe in the 1860s.

  The technique itself is a collaboration: the artist draws, the carver
  cuts the blocks, and the printer presses ink to paper. Each color
  requires a separate block, aligned with precision. The result is flat,
  bold, and graphic — qualities that made ukiyo-e a natural ancestor of
  modern poster design, Art Nouveau, and eventually flat digital design.

  On the web, ukiyo-e translates into decisive outlines, flat color
  fills, and a rejection of the soft gradients and drop shadows that
  dominate contemporary UI. It is a reminder that flatness is not
  minimalism — it can be rich, ornate, and deeply expressive. Every
  line carries the weight of a carved block, and every color the
  permanence of pressed ink.

